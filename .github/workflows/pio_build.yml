name: PlatformIO Build & Deploy

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, development]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Create config from template
        run: cp include/gotap_config.h.example include/gotap_config.h

      - name: Generate version.h
        run: python scripts/version_gen.py

      - name: Install dependencies
        run: pio pkg install -e JC8048W550C

      - name: Patch LVGL for Xtensa (stub ARM-only assembler)
        run: |
          # LVGL 9.2 ships ARM Helium/Neon .S files that fail on Xtensa.
          # Replace them with empty stubs so the assembler has nothing to reject.
          find . ~/.platformio -name "lv_blend_helium.S" -exec sh -c 'echo "/* stubbed for Xtensa */" > "$1"' _ {} \; 2>/dev/null || true
          find . ~/.platformio -name "lv_blend_neon.S"   -exec sh -c 'echo "/* stubbed for Xtensa */" > "$1"' _ {} \; 2>/dev/null || true

      - name: Build firmware
        run: pio run -e JC8048W550C

      - name: Upload Firmware Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
          path: .pio/build/JC8048W550C/firmware.bin

      - name: Deploy firmware to goTapList OTA
        if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          # Generate version in yyyy.mm.vv format
          YEAR=$(date +%Y)
          MONTH=$(date +%m)

          # Get commit count since last tag (not including the tag itself)
          # If no tags exist, count all commits
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            # Tags exist - count commits since last tag
            COMMIT_COUNT=$(git rev-list $(git describe --tags --abbrev=0)..HEAD --count 2>/dev/null || echo "0")
          else
            # No tags - count all commits
            COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          fi

          # Build version string
          VERSION="${YEAR}.${MONTH}.${COMMIT_COUNT}"

          # Add -dev suffix for development branch
          if [ "$BRANCH" = "development" ]; then
            VERSION="${VERSION}-dev"
          fi

          echo "Deploying firmware: version=${VERSION}, branch=${BRANCH}"
          curl -f -X POST "${{ secrets.GOTAPLIST_API_URL }}/ota/upload" \
            -F "file=@.pio/build/JC8048W550C/firmware.bin" \
            -F "version=${VERSION}" \
            -F "branch=${BRANCH}"
