[env:JC8048W550C]
platform = espressif32
board = JC8048W550C
framework = arduino
build_type = debug

; boards/ folder is scanned automatically by PlatformIO for custom board JSON.

; Automatic version generation from Git (pre: ensures it runs before build)
extra_scripts = pre:scripts/version_gen.py

; Serial Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Additional build flags on top of the board JSON
build_flags =
    -D CORE_DEBUG_LEVEL=3
    ; LVGL v9: add our include/ dir to the include path so lv_conf.h is found
    ; alongside lvgl's own folder (LVGL searches ../lv_conf.h relative to itself,
    ; and also the global include paths).
    -I include
    -I src

; Library dependencies
lib_deps =
    https://github.com/rzeldent/esp32-smartdisplay.git
    bblanchon/ArduinoJson@^7.3.0
    lvgl/lvgl@9.2.2
